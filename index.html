<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Control Quincenal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para transpilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap");

      :root {
        --primary: #0f172a;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      .font-mono {
        font-family: "JetBrains+Mono", monospace;
      }

      /* Ajustes para scroll suave y evitar saltos en mobile */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }

      /* Animación para el botón de guardado */
      @keyframes success-pop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }
      .btn-saved {
        animation: success-pop 0.3s ease-out;
        background-color: #10b981 !important;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo, useCallback, useEffect } = React;

      // --- CONSTANTES SUPABASE ---
      const SUPABASE_URL = "https://dxrjtrycheooniotrjfz.supabase.co";
      const SUPABASE_KEY = "sb_publishable__1n9OocWGlvFksTIu9Zfkg_ozNRmPaX";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // --- DATABASE ENGINE (IndexedDB & Gist) ---
      const DB_NAME = "PresupuestoDB";
      const STORE_NAME = "quincenas";

      const initDB = () => {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      };

      const saveToDB = async (data) => {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(data);
        return new Promise((resolve) => {
          tx.oncomplete = () => resolve();
        });
      };

      const getAllFromDB = async () => {
        const db = await initDB();
        return new Promise((resolve) => {
          const request = db
            .transaction(STORE_NAME)
            .objectStore(STORE_NAME)
            .getAll();
          request.onsuccess = () => resolve(request.result);
        });
      };

      const deleteFromDB = async (id) => {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(id);
      };

      const clearDB = async () => {
        const db = await initDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).clear();
        return new Promise((resolve) => {
          tx.oncomplete = () => resolve();
        });
      };

      const generateUUID = () => crypto.randomUUID();

      const fetchFromSupabase = async (userId) => {
        try {
          const { data, error } = await supabase
            .from("planes")
            .select(`id, user_id, periodo, fecha_creacion, movimientos (id, tipo, concepto, monto)`)
            .eq("user_id", userId);
          if (error) throw error;
          
          return data.map(plan => {
            const getMovType = (type) => plan.movimientos.filter(m => m.tipo === type);
            return {
              id: plan.id,
              periodo: plan.periodo,
              fechaCreacion: plan.fecha_creacion,
              ingresos: getMovType("ingreso"),
              ahorros: getMovType("ahorro"),
              gastosFijos: getMovType("fijo"),
              gastosVariables: getMovType("variable"),
            };
          });
        } catch (e) {
          console.error("Error al obtener de Supabase:", e);
          return null;
        }
      };

      const upsertSupabase = async (plan, userId) => {
        try {
          const { error: planErr } = await supabase.from("planes").upsert({
            id: plan.id,
            user_id: userId,
            periodo: plan.periodo,
            fecha_creacion: plan.fechaCreacion
          });
          if (planErr) throw planErr;

          await supabase.from("movimientos").delete().eq("plan_id", plan.id);
          
          const formatMov = (items, tipo) => items.map(i => ({
            id: i.id && i.id.length === 36 ? i.id : generateUUID(),
            plan_id: plan.id,
            tipo,
            concepto: i.concepto,
            monto: i.monto
          }));
          
          const allMovs = [
            ...formatMov(plan.ingresos, "ingreso"),
            ...formatMov(plan.ahorros, "ahorro"),
            ...formatMov(plan.gastosFijos, "fijo"),
            ...formatMov(plan.gastosVariables, "variable")
          ];
          
          if (allMovs.length > 0) {
            const { error: movErr } = await supabase.from("movimientos").insert(allMovs);
            if (movErr) throw movErr;
          }
          return null; // Éxito
        } catch (e) {
          console.error("Error al guardar en Supabase:", e);
          return e.message || "Error desconocido"; // Devolver el error
        }
      };
      
      const deletePlanSupabase = async (planId) => {
         try {
             const { error } = await supabase.from("planes").delete().eq("id", planId);
             if (error) throw error;
             return null;
         } catch(e) {
             console.error("Error al borrar en Supabase:", e);
             return e.message || "Error desconocido";
         }
      };

      // --- COMPONENTES AUXILIARES ---
      const Section = ({
        title,
        iconName,
        color,
        data,
        onUpdate,
        onAdd,
        onRemove,
        total,
      }) => {
        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [data]);

        return (
          <div className="bg-slate-900 rounded-2xl shadow-sm border border-slate-800 overflow-hidden mb-5">
            <div
              className={`p-4 ${color.replace("bg-", "bg-").replace("500", "600").replace("700", "800").replace("400", "700")} text-slate-100 flex justify-between items-center`}
            >
              <div className="flex items-center gap-2">
                <i data-lucide={iconName} className="w-5 h-5 opacity-90"></i>
                <h2 className="font-bold text-sm uppercase tracking-wider text-white">
                  {title}
                </h2>
              </div>
              <span className="font-mono font-bold text-lg text-white">
                ${total.toLocaleString("es-MX", { minimumFractionDigits: 2 })}
              </span>
            </div>
            <div className="p-4 space-y-3">
              {data.map((item) => (
                <div key={item.id} className="flex gap-2 items-center group">
                  <input
                    type="text"
                    placeholder="Concepto"
                    className="flex-1 p-2.5 bg-slate-800 border border-slate-700/50 rounded-xl focus:bg-slate-700 focus:ring-2 focus:ring-blue-500/50 outline-none text-sm transition-all placeholder:text-slate-500 text-slate-200"
                    value={item.concepto}
                    onChange={(e) =>
                      onUpdate(item.id, "concepto", e.target.value)
                    }
                  />
                  <div className="relative w-28 sm:w-32">
                    <span className="absolute left-3 top-2.5 text-slate-400 text-sm">
                      $
                    </span>
                    <input
                      type="number"
                      placeholder="0"
                      className="w-full p-2.5 pl-6 bg-slate-800 border border-slate-700/50 rounded-xl focus:bg-slate-700 focus:ring-2 focus:ring-blue-500/50 outline-none text-sm text-right font-semibold text-slate-200"
                      value={item.monto || ""}
                      onChange={(e) =>
                        onUpdate(item.id, "monto", e.target.value)
                      }
                    />
                  </div>
                  <button
                    onClick={() => onRemove(item.id)}
                    className="p-2 text-slate-500 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-all"
                  >
                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                  </button>
                </div>
              ))}
              <button
                onClick={onAdd}
                className="w-full py-2.5 border-2 border-dashed border-slate-700 rounded-xl flex items-center justify-center gap-2 text-slate-400 hover:text-blue-400 hover:border-blue-900 hover:bg-blue-900/20 transition-all text-xs font-bold uppercase tracking-widest"
              >
                <i data-lucide="plus-circle" className="w-4 h-4"></i> Agregar
              </button>
            </div>
          </div>
        );
      };

      const MainApp = ({ session }) => {
        const [isOnline, setIsOnline] = useState(navigator.onLine);
        const [history, setHistory] = useState([]);
        const [showHistory, setShowHistory] = useState(false);
        const [isSaving, setIsSaving] = useState(false);
        const [currentPlan, setCurrentPlan] = useState({
          id: generateUUID(),
          periodo: "",
          ingresos: [{ id: generateUUID(), concepto: "Sueldo", monto: 0 }],
          ahorros: [{ id: generateUUID(), concepto: "Ahorro", monto: 0 }],
          gastosFijos: [{ id: generateUUID(), concepto: "Renta", monto: 0 }],
          gastosVariables: [{ id: generateUUID(), concepto: "Comida", monto: 0 }],
          fechaCreacion: new Date().toISOString(),
        });

        useEffect(() => {
          const handleOnline = () => setIsOnline(true);
          const handleOffline = () => setIsOnline(false);
          window.addEventListener("online", handleOnline);
          window.addEventListener("offline", handleOffline);

          loadHistory();
          if (window.lucide) window.lucide.createIcons();

          return () => {
            window.removeEventListener("online", handleOnline);
            window.removeEventListener("offline", handleOffline);
          };
        }, []);

        const loadHistory = async () => {
          let finalData = [];
          if (navigator.onLine) {
            const supabaseData = await fetchFromSupabase(session.user.id);
            if (supabaseData && supabaseData.length > 0) {
              await clearDB();
              for (const item of supabaseData) {
                await saveToDB(item);
              }
              finalData = supabaseData;
            } else {
              finalData = await getAllFromDB();
            }
          } else {
            finalData = await getAllFromDB();
          }

          const sorted = finalData.sort(
            (a, b) => new Date(b.fechaCreacion) - new Date(a.fechaCreacion),
          );
          setHistory(sorted);
        };

        const saveCurrentPlan = async () => {
          setIsSaving(true);
          await saveToDB(currentPlan);

          if (navigator.onLine) {
            const err = await upsertSupabase(currentPlan, session.user.id);
            if (err) {
              alert("Error guardando en la Nube (Solo se guardó local): " + err);
            }
          }

          await loadHistory();
          setTimeout(() => setIsSaving(false), 1500);
        };

        const updateData = (section, id, field, value) => {
          setCurrentPlan((prev) => ({
            ...prev,
            [section]: prev[section].map((item) =>
              item.id === id
                ? {
                    ...item,
                    [field]:
                      field === "monto"
                        ? value === ""
                          ? 0
                          : parseFloat(value)
                        : value,
                  }
                : item,
            ),
          }));
        };

        const addItem = (section, prefix) => {
          setCurrentPlan((prev) => ({
            ...prev,
            [section]: [
              ...prev[section],
              { id: generateUUID(), concepto: "", monto: 0 },
            ],
          }));
        };

        const removeItem = (section, id) => {
          setCurrentPlan((prev) => ({
            ...prev,
            [section]: prev[section].filter((item) => item.id !== id),
          }));
        };

        const deletePlan = async (e, id) => {
          e.stopPropagation();
          if (window.confirm("¿Estás seguro de eliminar este registro?")) {
            await deleteFromDB(id);

            if (navigator.onLine) {
              const err = await deletePlanSupabase(id);
              if (err) {
                 alert("Borrador local existoso, pero en la Nube falló: " + err);
              }
            }

            await loadHistory();
            if (currentPlan.id === id) {
              setCurrentPlan({
                id: generateUUID(),
                periodo: "Nueva Quincena",
                ingresos: [{ id: generateUUID(), concepto: "Sueldo", monto: 0 }],
                ahorros: [{ id: generateUUID(), concepto: "Ahorro", monto: 0 }],
                gastosFijos: [{ id: generateUUID(), concepto: "Renta", monto: 0 }],
                gastosVariables: [{ id: generateUUID(), concepto: "Comida", monto: 0 }],
                fechaCreacion: new Date().toISOString(),
              });
            }
          }
        };

        const totalIngresos = useMemo(
          () =>
            currentPlan.ingresos.reduce(
              (acc, curr) => acc + (curr.monto || 0),
              0,
            ),
          [currentPlan.ingresos],
        );
        const totalAhorros = useMemo(
          () =>
            currentPlan.ahorros.reduce(
              (acc, curr) => acc + (curr.monto || 0),
              0,
            ),
          [currentPlan.ahorros],
        );
        const totalFijos = useMemo(
          () =>
            currentPlan.gastosFijos.reduce(
              (acc, curr) => acc + (curr.monto || 0),
              0,
            ),
          [currentPlan.gastosFijos],
        );
        const totalVariables = useMemo(
          () =>
            currentPlan.gastosVariables.reduce(
              (acc, curr) => acc + (curr.monto || 0),
              0,
            ),
          [currentPlan.gastosVariables],
        );
        const totalEgresos = totalFijos + totalVariables + totalAhorros;
        const balance = totalIngresos - totalEgresos;

        return (
          <div className="min-h-screen pb-24 md:pb-8 pt-4 md:pt-8 px-4 max-w-5xl mx-auto">
            {/* Historial Overlay */}
            {showHistory && (
              <div className="fixed inset-0 z-[60] bg-slate-950/80 backdrop-blur-sm flex justify-end">
                <div className="w-[85%] max-w-xs bg-slate-900 border-l border-slate-800 h-full shadow-2xl p-6 flex flex-col animate-slide-in">
                  <div className="flex items-center justify-between mb-8">
                    <h2 className="font-extrabold text-xl text-white tracking-tight">
                      HISTORIAL
                    </h2>
                    <button
                      onClick={() => setShowHistory(false)}
                      className="p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-full transition-colors"
                    >
                      <i data-lucide="x" className="w-5 h-5"></i>
                    </button>
                  </div>
                  <button
                    onClick={() => {
                      setCurrentPlan({
                        id: generateUUID(),
                        periodo: "Nueva Quincena",
                        ingresos: [{ id: generateUUID(), concepto: "Sueldo", monto: 0 }],
                        ahorros: [{ id: generateUUID(), concepto: "Ahorro", monto: 0 }],
                        gastosFijos: [
                          { id: generateUUID(), concepto: "Renta", monto: 0 },
                        ],
                        gastosVariables: [
                          { id: generateUUID(), concepto: "Comida", monto: 0 },
                        ],
                        fechaCreacion: new Date().toISOString(),
                      });
                      setShowHistory(false);
                    }}
                    className="w-full mb-6 py-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-200 active:scale-95 transition-all"
                  >
                    <i data-lucide="plus" className="w-5 h-5"></i> Nuevo Plan
                  </button>
                  <div className="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-1">
                    {history.map((plan) => (
                      <div
                        key={plan.id}
                        onClick={() => {
                          setCurrentPlan(plan);
                          setShowHistory(false);
                        }}
                        className={`p-4 rounded-2xl border flex justify-between items-center transition-all cursor-pointer ${currentPlan.id === plan.id ? "border-blue-500 bg-blue-500/10 ring-1 ring-blue-500" : "border-slate-800 bg-slate-800/50 hover:bg-slate-800"}`}
                      >
                        <div className="flex flex-col">
                          <p className="font-bold text-sm text-slate-200 leading-tight">
                            {plan.periodo || "Quincena sin nombre"}
                          </p>
                          <p className="text-[10px] text-slate-500 mt-1 uppercase font-bold tracking-wider">
                            {new Date(plan.fechaCreacion).toLocaleDateString()}
                          </p>
                        </div>
                        <button
                          onClick={(e) => deletePlan(e, plan.id)}
                          className="p-1.5 text-slate-300 hover:text-red-500"
                        >
                          <i data-lucide="trash-2" className="w-4 h-4"></i>
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            <header className="mb-8">
              <div className="flex flex-row justify-between items-center mb-6">
                <div className="flex flex-col">
                  <h1 className="text-2xl font-extrabold text-white tracking-tighter leading-none mb-1">
                    Finanzas Personales
                  </h1>
                  <div className="flex items-center gap-2">
                    <span
                      className={`w-2 h-2 rounded-full animate-pulse ${isOnline ? "bg-emerald-500" : "bg-amber-500"}`}
                    ></span>
                    <p
                      className={`text-[10px] font-bold uppercase tracking-[0.2em] ${isOnline ? "text-emerald-500/80" : "text-amber-500/80"}`}
                    >
                      {isOnline ? "Supabase Activo" : "Modo Offline"}
                    </p>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={() => supabase.auth.signOut()}
                    className="p-2.5 bg-slate-800 border border-slate-700 hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/30 rounded-xl text-slate-400 shadow-sm transition-colors"
                    title="Cerrar Sesión"
                  >
                    <i data-lucide="log-out" className="w-5 h-5"></i>
                  </button>
                  <button
                    onClick={() => setShowHistory(true)}
                    className="p-2.5 bg-slate-800 border border-slate-700 hover:bg-slate-700 rounded-xl text-slate-300 shadow-sm active:bg-slate-900 transition-colors"
                    title="Historial"
                  >
                    <i data-lucide="history" className="w-5 h-5"></i>
                  </button>
                  <button
                    onClick={saveCurrentPlan}
                    className={`hidden md:flex items-center gap-2 px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg ${isSaving ? "btn-saved text-white" : "bg-white text-slate-900 hover:bg-slate-200"}`}
                  >
                    <i
                      data-lucide={isSaving ? "check" : "save"}
                      className="w-4 h-4"
                    ></i>
                    {isSaving ? "Guardado" : "Guardar"}
                  </button>
                </div>
              </div>

              <div className="bg-slate-900 p-5 rounded-3xl shadow-sm border border-slate-800 flex flex-col gap-1 transition-all focus-within:ring-2 focus-within:ring-blue-500/50">
                <label className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest ml-1">
                  Periodo Actual
                </label>
                <input
                  type="text"
                  placeholder="Escribe el nombre de la quincena..."
                  className="w-full text-xl font-bold bg-transparent border-none focus:ring-0 p-0 text-white placeholder:text-slate-600 outline-none"
                  value={currentPlan.periodo}
                  onChange={(e) =>
                    setCurrentPlan((prev) => ({
                      ...prev,
                      periodo: e.target.value,
                    }))
                  }
                />
              </div>
            </header>

            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
              <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-sm">
                <p className="text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">
                  Ingresos
                </p>
                <p className="text-lg font-mono font-black text-emerald-500 tracking-tighter">
                  ${totalIngresos.toLocaleString()}
                </p>
              </div>
              <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-sm">
                <p className="text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">
                  Ahorro
                </p>
                <p className="text-lg font-mono font-black text-blue-500 tracking-tighter">
                  ${totalAhorros.toLocaleString()}
                </p>
              </div>
              <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-sm">
                <p className="text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">
                  Gastos
                </p>
                <p className="text-lg font-mono font-black text-slate-300 tracking-tighter">
                  ${(totalFijos + totalVariables).toLocaleString()}
                </p>
              </div>
              <div
                className={`p-4 rounded-2xl shadow-sm flex flex-col justify-center transition-colors ${balance >= 0 ? "bg-blue-600 text-white" : "bg-red-600 text-white"}`}
              >
                <p className="text-[10px] font-bold opacity-70 uppercase mb-1 tracking-wider">
                  Libre
                </p>
                <p className="text-lg font-mono font-black tracking-tighter">
                  ${balance.toLocaleString()}
                </p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-6">
              <Section
                title="Ingresos"
                iconName="arrow-up-circle"
                color="bg-emerald-500"
                data={currentPlan.ingresos}
                onUpdate={(id, f, v) => updateData("ingresos", id, f, v)}
                onAdd={() => addItem("ingresos", "i")}
                onRemove={(id) => removeItem("ingresos", id)}
                total={totalIngresos}
              />
              <Section
                title="Ahorro"
                iconName="shield-check"
                color="bg-blue-500"
                data={currentPlan.ahorros}
                onUpdate={(id, f, v) => updateData("ahorros", id, f, v)}
                onAdd={() => addItem("ahorros", "a")}
                onRemove={(id) => removeItem("ahorros", id)}
                total={totalAhorros}
              />
              <Section
                title="Gastos Fijos"
                iconName="arrow-down-circle"
                color="bg-slate-700"
                data={currentPlan.gastosFijos}
                onUpdate={(id, f, v) => updateData("gastosFijos", id, f, v)}
                onAdd={() => addItem("gastosFijos", "gf")}
                onRemove={(id) => removeItem("gastosFijos", id)}
                total={totalFijos}
              />
              <Section
                title="Gastos Variables"
                iconName="shopping-cart"
                color="bg-slate-400"
                data={currentPlan.gastosVariables}
                onUpdate={(id, f, v) => updateData("gastosVariables", id, f, v)}
                onAdd={() => addItem("gastosVariables", "gv")}
                onRemove={(id) => removeItem("gastosVariables", id)}
                total={totalVariables}
              />
            </div>

            {/* Mobile Floating Bar */}
            <div className="fixed bottom-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-md border-t border-slate-800 flex items-center justify-between gap-4 md:hidden z-50">
              <div className="flex flex-col">
                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                  Saldo Final
                </p>
                <p
                  className={`text-xl font-mono font-black tracking-tighter ${balance >= 0 ? "text-blue-500" : "text-red-500"}`}
                >
                  ${balance.toLocaleString()}
                </p>
              </div>
              <button
                onClick={saveCurrentPlan}
                className={`flex-1 py-4 rounded-2xl font-black text-sm uppercase tracking-widest transition-all shadow-xl active:scale-95 flex items-center justify-center gap-2 ${isSaving ? "btn-saved text-slate-900" : "bg-white text-slate-900"}`}
              >
                <i
                  data-lucide={isSaving ? "check-circle" : "save"}
                  className="w-5 h-5"
                ></i>
                {isSaving ? "Guardado" : "Guardar"}
              </button>
            </div>

            <footer className="mt-8 mb-4 text-center">
              <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.4em]">
                Finanzas Personales - Control Quincenal
              </p>
            </footer>
          </div>
        );
      };

      const App = () => {
        const [session, setSession] = useState(null);
        const [authEmail, setAuthEmail] = useState("");
        const [authPassword, setAuthPassword] = useState("");
        const [authLoading, setAuthLoading] = useState(false);
        const [authMode, setAuthMode] = useState("login");

        useEffect(() => {
          supabase.auth.getSession().then(({ data: { session } }) => {
            setSession(session);
          });
          const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
            setSession(session);
          });
          return () => subscription.unsubscribe();
        }, []);

        const handleAuth = async (e) => {
          e.preventDefault();
          setAuthLoading(true);
          let error = null;
          if (authMode === "login") {
            const res = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword });
            error = res.error;
          } else {
            const res = await supabase.auth.signUp({ email: authEmail, password: authPassword });
            error = res.error;
            if (!error) alert("Revisa tu email (si tienes habilitada la confirmación) o inicia sesión ahora.");
          }
          setAuthLoading(false);
          if (error) alert("Error: " + error.message);
        };

        if (!session) {
          return (
            <div className="min-h-screen flex items-center justify-center p-4">
              <form onSubmit={handleAuth} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-xl w-full max-w-sm flex flex-col gap-5 animate-slide-in">
                <div className="text-center mb-4">
                  <h1 className="text-2xl font-black text-white tracking-tighter">FINANZAS</h1>
                  <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Autenticación Supabase</p>
                </div>
                
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Email</label>
                  <input 
                    type="email" 
                    required 
                    value={authEmail} 
                    onChange={e => setAuthEmail(e.target.value)} 
                    className="p-3 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="tucorreo@ejemplo.com"
                  />
                </div>
                
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Contraseña</label>
                  <input 
                    type="password" 
                    required 
                    value={authPassword} 
                    onChange={e => setAuthPassword(e.target.value)} 
                    className="p-3 bg-slate-950 border border-slate-800 rounded-xl text-white outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="••••••••"
                  />
                </div>
                
                <button 
                  type="submit" 
                  disabled={authLoading}
                  className="mt-2 w-full py-3 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all rounded-xl text-white font-bold uppercase tracking-widest disabled:opacity-50"
                >
                  {authLoading ? "Cargando..." : (authMode === "login" ? "Ingresar" : "Registrarse")}
                </button>
                
                <button 
                  type="button" 
                  onClick={() => setAuthMode(authMode === "login" ? "register" : "login")}
                  className="text-xs font-bold text-slate-500 hover:text-slate-300 mt-2 transition-colors uppercase tracking-widest"
                >
                  {authMode === "login" ? "¿No tienes cuenta? Regístrate" : "Ya tengo cuenta, iniciar sesión"}
                </button>
              </form>
            </div>
          );
        }

        return <MainApp session={session} />;
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
